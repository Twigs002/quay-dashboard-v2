name: Probe DialFire Column Names

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Probe
        env:
          CAMPAIGN_CLIENTHUB_ID:    ${{ secrets.CAMPAIGN_CLIENTHUB_ID }}
          CAMPAIGN_CLIENTHUB_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_TOKEN }}
        run: python scripts/probe_columns.py
