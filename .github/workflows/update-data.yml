name: Update Dashboard Data

on:
  schedule:
          # Runs at 02:27 SAST (00:27 UTC) every weekday Monday-Friday
          - cron: '27 0 * * 1-5'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: true

jobs:
  fetch-and-update:
    name: Fetch DialFire data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch DialFire data
        env:
          DIALFIRE_TENANT_ID:    ${{ secrets.DIALFIRE_TENANT_ID }}
          DIALFIRE_TENANT_TOKEN: ${{ secrets.DIALFIRE_TENANT_TOKEN }}
          DIALFIRE_CAMPAIGNS:    ${{ secrets.DIALFIRE_CAMPAIGNS }}
          CAMPAIGN_CLIENTHUB_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_ID }}
          CAMPAIGN_CLIENTHUB_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_TOKEN }}
          CAMPAIGN_CLIENTHUB_NEW_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_NEW_ID }}
          CAMPAIGN_CLIENTHUB_NEW_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_NEW_TOKEN }}
          CAMPAIGN_1_ID: ${{ secrets.CAMPAIGN_1_ID }}
          CAMPAIGN_1_TOKEN: ${{ secrets.CAMPAIGN_1_TOKEN }}
          CAMPAIGN_2_ID: ${{ secrets.CAMPAIGN_2_ID }}
          CAMPAIGN_2_TOKEN: ${{ secrets.CAMPAIGN_2_TOKEN }}
          CAMPAIGN_CLIENTHUB_NO_ANSWER_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_NO_ANSWER_ID }}
          CAMPAIGN_CLIENTHUB_NO_ANSWER_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_NO_ANSWER_TOKEN }}
          ASSASSINS_CM_ID: ${{ secrets.ASSASSINS_CM_ID }}
          ASSASSINS_CM_TOKEN: ${{ secrets.ASSASSINS_CM_TOKEN }}
          ASSASSINS_NA_ID: ${{ secrets.ASSASSINS_NA_ID }}
          ASSASSINS_NA_TOKEN: ${{ secrets.ASSASSINS_NA_TOKEN }}
          AMIGOS_CM_ID: ${{ secrets.AMIGOS_CM_ID }}
          AMIGOS_CM_TOKEN: ${{ secrets.AMIGOS_CM_TOKEN }}
          AMIGOS_NA_ID: ${{ secrets.AMIGOS_NA_ID }}
          AMIGOS_NA_TOKEN: ${{ secrets.AMIGOS_NA_TOKEN }}
        run: python scripts/fetch_dialfire.py

      - name: Fetch quay-clock clocked hours
        env:
          QUAY_CLOCK_URL: ${{ secrets.QUAY_CLOCK_URL }}
        run: python scripts/fetch_clock.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/weekly_data.json data/history.json data/clock_data.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "auto-update $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
