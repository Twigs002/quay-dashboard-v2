name: Update Daily Data

on:
  schedule:
    # Evening run: 19:00 SAST (17:00 UTC) — pulls today's data after close
    # of business so it's ready overnight.
    - cron: '0 17 * * *'
    # Morning safety net: 07:00 SAST (05:00 UTC) — self-heals any gap if
    # the evening run was cancelled, queued, or failed.
    - cron: '0 5 * * *'

  workflow_dispatch:
    inputs:
      start_date:
        description: Start date YYYY-MM-DD leave blank for self-heal (last 7d + missing)
        required: false
        default: ''
      end_date:
        description: End date YYYY-MM-DD leave blank for self-heal (last 7d + missing)
        required: false
        default: ''

concurrency:
  group: daily-data-update
  cancel-in-progress: false

jobs:
  fetch-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch DialFire daily data
        env:
          CAMPAIGN_CLIENTHUB_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_ID }}
          CAMPAIGN_CLIENTHUB_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_TOKEN }}
          CAMPAIGN_CLIENTHUB_NEW_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_NEW_ID }}
          CAMPAIGN_CLIENTHUB_NEW_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_NEW_TOKEN }}
          CAMPAIGN_1_ID: ${{ secrets.CAMPAIGN_1_ID }}
          CAMPAIGN_1_TOKEN: ${{ secrets.CAMPAIGN_1_TOKEN }}
          CAMPAIGN_2_ID: ${{ secrets.CAMPAIGN_2_ID }}
          CAMPAIGN_2_TOKEN: ${{ secrets.CAMPAIGN_2_TOKEN }}
          CAMPAIGN_CLIENTHUB_NO_ANSWER_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_NO_ANSWER_ID }}
          CAMPAIGN_CLIENTHUB_NO_ANSWER_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_NO_ANSWER_TOKEN }}
          ASSASSINS_CM_ID: ${{ secrets.ASSASSINS_CM_ID }}
          ASSASSINS_CM_TOKEN: ${{ secrets.ASSASSINS_CM_TOKEN }}
          ASSASSINS_NA_ID: ${{ secrets.ASSASSINS_NA_ID }}
          ASSASSINS_NA_TOKEN: ${{ secrets.ASSASSINS_NA_TOKEN }}
          AMIGOS_CM_ID: ${{ secrets.AMIGOS_CM_ID }}
          AMIGOS_CM_TOKEN: ${{ secrets.AMIGOS_CM_TOKEN }}
          AMIGOS_NA_ID: ${{ secrets.AMIGOS_NA_ID }}
          AMIGOS_NA_TOKEN: ${{ secrets.AMIGOS_NA_TOKEN }}
          DIALFIRE_CAMPAIGNS: ${{ secrets.DIALFIRE_CAMPAIGNS }}
          DIALFIRE_TENANT_ID: ${{ secrets.DIALFIRE_TENANT_ID }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
        run: python scripts/fetch_dialfire_daily.py
      - name: Fetch quay-clock clocked hours
        # update-data.yml only runs weekdays ~07:00 SAST, BEFORE anyone has
        # clocked out — so its clock_data.json is always ~24h stale (and
        # "this-week" reads 0 until the next morning). Re-run here at the
        # 19:00 SAST evening slot to capture today's clock-outs, and again
        # at the 07:00 morning safety-net slot to cover weekends.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/fetch_clock.py
      - name: Commit daily data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_data.json data/clock_data.json
          git diff --staged --quiet || git commit -m "Update daily data"
          git pull --rebase origin main
          git push
