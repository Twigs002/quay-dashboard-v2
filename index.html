<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quay 1 — Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quay/styles.css">
</head>
<body>
<div class="app" id="app">
  <div style="padding:48px;font-family:Hanken Grotesk,Arial,sans-serif;color:#566275">Loading live data…</div>
</div>

<script src="quay/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
  window.sb = window.supabase.createClient(window.QUAY_CONFIG.SUPABASE_URL, window.QUAY_CONFIG.SUPABASE_ANON_KEY);
</script>
<script src="quay/data.js"></script>
<script src="quay/lib.js"></script>
<script>
  // views.js + app.js both capture `const Q = window.QUAY` at module-load
  // time — so we must defer loading them until QUAY is populated by data.js.
  // (lib.js doesn't reference QUAY, safe to load eagerly.)
  window.QUAY_READY.then(() => {
    const load = src => new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src; s.onload = res; s.onerror = rej;
      document.body.appendChild(s);
    });
    return load('quay/views.js').then(() => load('quay/app.js'));
  }).catch(err => {
    document.getElementById('app').innerHTML =
      '<div style="padding:48px;font-family:sans-serif;color:#b1303a">' +
      '<h2>Couldn’t load dashboard data</h2>' +
      '<pre style="white-space:pre-wrap">' + (err && err.message || err) + '</pre>' +
      '<p>Check <code>data/weekly_data.json</code> and <code>data/history.json</code> in the repo.</p>' +
      '</div>';
    console.error(err);
  });
</script>
</body>
</html>
